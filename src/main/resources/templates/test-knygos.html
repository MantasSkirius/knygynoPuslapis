<!DOCTYPE html>
<html lang="en"
xmlns:th="http://www.thymeleaf.org"
>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Knygos saraso puslapis</title>
</head>
<body>
    <table>
        <thead>
        <tr>
            <th>Pavadinimas</th>
            <th>Leidejas</th>
            <th>Puslapiu skaicius</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="knyga : ${knygos}">
            <td th:text="${knyga.pavadinimas}"></td>
            <td th:text="${knyga.leidejas}"></td>
            <td th:text="${knyga.puslapiuSkaicius}"></td>
        </tr>
        </tbody>
    </table>
</body>
</html>
